name: Portfolio CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ==================== FRONTEND ====================
  frontend-validate:
    name: Frontend - Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check with TypeScript
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Lint with ESLint
        working-directory: ./frontend
        run: npx eslint src

      - name: Run unit tests
        working-directory: ./frontend
        run: npx vitest run

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build output
        working-directory: ./frontend
        run: |
          test -d dist || (echo "FAIL: dist/ not found" && exit 1)
          test -f dist/index.html || (echo "FAIL: dist/index.html not found" && exit 1)
          echo "Build output verified."

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ==================== BACKEND ====================
  backend-validate:
    name: Backend - Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: portfolio_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile check
        working-directory: ./backend
        run: mvn compile -q

      - name: Run all tests (unit + integration)
        working-directory: ./backend
        run: mvn test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/portfolio_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: 1234

      - name: Verify JAR build
        working-directory: ./backend
        run: mvn package -DskipTests -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/

      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ==================== SECURITY SCAN ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [ backend-validate, frontend-validate ]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache OWASP NVD Data
        uses: actions/cache@v4
        with:
          path: |
            ~/.dependency-check
            ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Run OWASP Dependency Check (Backend)
        working-directory: ./backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn org.owasp:dependency-check-maven:check -q
        timeout-minutes: 15
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Run npm audit (Frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=moderate || echo "npm audit completed"
        continue-on-error: true

  # ==================== DOCKER ====================
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}/backend:latest
            ghcr.io/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}

  # ==================== DEPLOYMENT ====================
  deploy-render:
    name: Deploy to Render
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait 5 minutes for Render to deploy
        run: |
          echo "Waiting 300 seconds for Render backend to fully deploy..."
          sleep 100
          echo "Wait complete."

  deploy-to-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-render
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==================== NOTIFICATIONS ====================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [frontend-validate, backend-validate, security-scan, deploy-render, deploy-to-github-pages]
    if: always()
    steps:
      - name: Check job results and build message
        id: check
        run: |
          JOBS="frontend-validate=${{ needs.frontend-validate.result }} backend-validate=${{ needs.backend-validate.result }} security-scan=${{ needs.security-scan.result }} deploy-render=${{ needs.deploy-render.result }} deploy-to-github-pages=${{ needs.deploy-to-github-pages.result }}"

          FAILED_JOB=""
          ALL_SUCCESS=true

          for job in $JOBS; do
            name="${job%%=*}"
            result="${job##*=}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              ALL_SUCCESS=false
              FAILED_JOB="$name"
              break
            fi
          done

          if [ "$ALL_SUCCESS" = true ]; then
            echo "outcome=success" >> $GITHUB_OUTPUT
          else
            echo "outcome=failure" >> $GITHUB_OUTPUT
            echo "failed_job=$FAILED_JOB" >> $GITHUB_OUTPUT
          fi

      - name: Build Slack payload
        id: payload
        if: always()
        run: |
          if [ "${{ steps.check.outputs.outcome }}" = "success" ]; then
            PAYLOAD=$(cat <<'EOF'
          {
            "text": "Portfolio Pipeline SUCCEEDED",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "Portfolio Deployed Successfully" }
              },
              {
                "type": "section",
                "text": { "type": "mrkdwn", "text": "*All stages passed.*\nYour portfolio is live and updated." }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "View Portfolio" },
                    "url": "https://masapakaraju.github.io/portfolio/",
                    "style": "primary"
                  },
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "View Workflow" },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
          EOF
          )
          else
            PAYLOAD=$(cat <<EOF
          {
            "text": "Portfolio Pipeline FAILED",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "Pipeline Failed" }
              },
              {
                "type": "section",
                "text": { "type": "mrkdwn", "text": "*Failed Stage:* \`${{ steps.check.outputs.failed_job }}\`\n*Author:* ${{ github.actor }}\n*Branch:* ${{ github.ref }}" }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": { "type": "plain_text", "text": "View Logs" },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "style": "danger"
                  }
                ]
              }
            ]
          }
          EOF
          )
          fi
          echo "payload<<PAYLOAD_EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "PAYLOAD_EOF" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          payload: ${{ steps.payload.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
